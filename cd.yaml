name: Deploy on Merge to kmjl

on:
  pull_request:
    types: [closed]
    branches: [kmjl]

jobs:
  deploy:
    if: github.event.pull_request.merged == true   # only real merges

    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build for KMJL
        env:
          CLIENT: kmjl
          # Add any secrets here if needed, e.g.
          # REACT_APP_MUI_LICENSE: ${{ secrets.MUI_LICENSE }}
        run: npm run build:client

      - name: Get deploy path
        id: deploy
        run: |
          DEPLOY_PATH=$(jq -r ".KMJL.deployPath" clients.json)
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> $GITHUB_ENV

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/*"
          target: ${{ env.DEPLOY_PATH }}

      - name: Log success
        run: echo "Deployed to kmjl after successful merge!"